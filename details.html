<!DOCTYPE html>
<html>
<head>
  <title>Details</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="dark">

<div class="details-box" id="detailsBox"></div>

<script>
const file = JSON.parse(localStorage.getItem("file"));

document.getElementById("detailsBox").innerHTML = `
  <h2>${file.name}</h2>

  <p><b>Type:</b> ${file.type}</p>
  <p><b>Risk:</b> ${file.risk >= 3 ? "🔴 High" : "🟡 Medium"}</p>

  <p><b>Role:</b> ${file.role}</p>
  <p>${file.description}</p>

  <h3>Dependencies</h3>
  <ul>
    ${file.dependencies.length ? file.dependencies.map(d => `<li>${d}</li>`).join("") : "<li>None</li>"}
  </ul>

  <h3>Dependents</h3>
  <ul>
    ${file.dependents.length ? file.dependents.map(d => `<li>${d}</li>`).join("") : "<li>None</li>"}
  </ul>
`;
</script>

</body>
</html>
